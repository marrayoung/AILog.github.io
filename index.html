<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARMCO — AI Prompt Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f5f7; --surface:#fff; --surface2:#f8f9fb; --border:#e2e5ea; --border2:#d0d5dd;
    --accent:#2563eb; --accent-lt:#eff4ff; --accent-dk:#1d4ed8;
    --green:#16a34a; --green-bg:#f0fdf4;
    --amber:#d97706; --amber-bg:#fffbeb;
    --purple:#7c3aed; --purple-bg:#f5f3ff;
    --red:#dc2626; --red-bg:#fef2f2;
    --text:#111827; --text2:#374151; --muted:#6b7280; --muted2:#9ca3af;
    --mono:'IBM Plex Mono',monospace; --sans:'Plus Jakarta Sans',sans-serif;
    --shadow-sm:0 1px 2px rgba(0,0,0,.05);
    --shadow:0 2px 8px rgba(0,0,0,.08);
    --shadow-lg:0 8px 24px rgba(0,0,0,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

  /* Header */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
  .hd-left{display:flex;align-items:center;gap:12px;}
  .logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.5px;}
  .hd-text h1{font-size:16px;font-weight:700;letter-spacing:-.3px;}
  .hd-text p{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
  .stats{display:flex;gap:6px;}
  .stat{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .dot{width:6px;height:6px;border-radius:50%;}
  .dot-b{background:var(--accent);} .dot-g{background:var(--green);} .dot-a{background:var(--amber);}
  .stat b{font-weight:600;color:var(--text2);font-family:var(--mono);}

  /* Controls */
  .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .srch{position:relative;flex:1;min-width:200px;}
  .srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none;}
  .srch input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px 7px 30px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;}
  .srch input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .srch input::placeholder{color:var(--muted2);}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;color:var(--text2);font-family:var(--sans);font-size:13px;outline:none;cursor:pointer;transition:border-color .15s;}
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s,transform .1s;}
  .btn:hover{background:var(--accent-dk);}
  .btn:active{transform:scale(.98);}
  .btn-g{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:7px 13px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .btn-g:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);}

  /* Table */
  .tc{padding:18px 28px;}
  .tw{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .ts{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{background:var(--surface2);border-bottom:1px solid var(--border);padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s;}
  thead th:hover{color:var(--accent);}
  thead th.sa::after{content:' ↑';color:var(--accent);}
  thead th.sd::after{content:' ↓';color:var(--accent);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#fafbff;}
  tbody td{padding:10px 12px;vertical-align:top;}

  .ci{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);white-space:nowrap;}
  .cr{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}
  .cd{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;}
  .bdot{width:5px;height:5px;border-radius:50%;}
  .bc{background:#eff4ff;color:#2563eb;} .bc .bdot{background:#2563eb;}
  .bg{background:#f0fdf4;color:#16a34a;} .bg .bdot{background:#16a34a;}
  .bge{background:#fffbeb;color:#d97706;} .bge .bdot{background:#d97706;}
  .bo{background:#f5f3ff;color:#7c3aed;} .bo .bdot{background:#7c3aed;}

  .cp{display:inline-block;padding:2px 8px;border-radius:5px;font-family:var(--mono);font-size:11px;font-weight:500;background:#f5f3ff;color:#7c3aed;white-space:nowrap;}

  .ct{max-width:260px;color:var(--text2);line-height:1.55;}
  .cres{max-width:240px;color:var(--muted);line-height:1.55;}
  .catt{font-family:var(--mono);font-size:11px;color:var(--muted);max-width:130px;line-height:1.4;}

  .clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .xbtn{background:none;border:none;color:var(--accent);font-size:11px;font-family:var(--sans);font-weight:500;cursor:pointer;padding:2px 0;display:block;margin-top:2px;}
  .xbtn:hover{text-decoration:underline;}

  /* Thumbnails */
  .thumbs{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
  .thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:opacity .15s;}
  .thumb:hover{opacity:.8;}
  .no-img{font-family:var(--mono);font-size:11px;color:var(--muted2);}

  .ra{display:flex;gap:4px;}
  .ib{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;transition:all .15s;}
  .ib:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);}
  .ib.dl:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

  /* Footer */
  .fb{background:var(--surface);border-top:1px solid var(--border);padding:9px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;box-shadow:0 -1px 4px rgba(0,0,0,.05);}
  .fb span{font-size:11px;color:var(--muted);font-family:var(--mono);}
  .fa{display:flex;gap:7px;}

  .empty{padding:48px;text-align:center;color:var(--muted);font-size:13px;}

  /* Modal */
  .ov{display:none;position:fixed;inset:0;background:rgba(17,24,39,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  .ov.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:720px;max-width:95vw;max-height:92vh;overflow-y:auto;padding:26px;box-shadow:var(--shadow-lg);animation:pop .18s ease;}
  @keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px);}to{opacity:1;transform:none;}}
  .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .mh h2{font-size:16px;font-weight:700;}
  .mc{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:5px;}
  .mc:hover{background:var(--surface2);color:var(--text);}

  .fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .fgr{display:flex;flex-direction:column;gap:5px;}
  .fgr.full{grid-column:1/-1;}
  .fgr label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .fgr input,.fgr select,.fgr textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
  .fgr input:focus,.fgr select:focus,.fgr textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .fgr textarea{resize:vertical;min-height:80px;line-height:1.5;}

  /* Image upload area */
  .img-upload-area{border:2px dashed var(--border2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;}
  .img-upload-area:hover,.img-upload-area.drag{border-color:var(--accent);background:var(--accent-lt);}
  .img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .img-upload-area p{font-size:12px;color:var(--muted);pointer-events:none;}
  .img-upload-area p span{color:var(--accent);font-weight:600;}
  .img-preview-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .img-preview-item{position:relative;width:64px;height:64px;}
  .img-preview-item img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
  .img-preview-item .rm-img{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}

  .mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

  /* Lightbox */
  .lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;cursor:zoom-out;}
  .lb.open{display:flex;}
  .lb img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5);}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>

<script>
// ── Supabase config ───────────────────────────────────────────────────────────
const SB_URL = 'https://apxmqkouawbufiniplfc.supabase.co';
const SB_KEY = 'sb_publishable_Ix2R7AqrWamTPrT2b8o40w_mWUHE3DH';
const SB_HDR = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

// Map camelCase ↔ snake_case for Supabase columns
function toRow(p) {
  return {
    id: p.id,
    related_to: p.relatedTo||'',
    platform: p.platform||'',
    date: p.date||'',
    prompt: p.prompt||'',
    file_used_for: p.fileUsedFor||'',
    category: p.category||'',
    attachments: p.attachments||'',
    results: p.results||'',
    images: p.images||[],
  };
}

function fromRow(r) {
  return {
    id: r.id,
    relatedTo: r.related_to||'',
    platform: r.platform||'',
    date: r.date||'',
    prompt: r.prompt||'',
    fileUsedFor: r.file_used_for||'',
    category: r.category||'',
    attachments: r.attachments||'',
    results: r.results||'',
    images: r.images||[],
  };
}

async function sbGetAll() {
  const res = await fetch(`${SB_URL}/rest/v1/prompts?select=*&order=id`, { headers: SB_HDR });
  if (!res.ok) throw new Error(await res.text());
  return (await res.json()).map(fromRow);
}

async function sbUpsert(entry) {
  const res = await fetch(`${SB_URL}/rest/v1/prompts`, {
    method: 'POST',
    headers: { ...SB_HDR, 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(toRow(entry)),
  });
  if (!res.ok) throw new Error(await res.text());
}

async function sbDelete(id) {
  const res = await fetch(`${SB_URL}/rest/v1/prompts?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE', headers: SB_HDR,
  });
  if (!res.ok) throw new Error(await res.text());
}

// ── IndexedDB — images only ───────────────────────────────────────────────────
const DB_NAME = 'parmco_db', DB_VER = 1;
let db, prompts = [], editingId = null, pendingImgs = [], sortCol = 'id', sortDir = 1;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('images')) d.createObjectStore('images', {keyPath:'key'});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e);
  });
}

function dbGet(store, key) {
  return new Promise((res,rej) => {
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}

function dbPut(store, val) {
  return new Promise((res,rej) => {
    const tx = db.transaction(store,'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = () => res();
    req.onerror = rej;
  });
}

function dbDelete(store, key) {
  return new Promise((res,rej) => {
    const tx = db.transaction(store,'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = rej;
  });
}

// ── Image handling ────────────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

async function handleFiles(files) {
  for (const f of files) {
    const b64 = await fileToBase64(f);
    const key = `img_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    pendingImgs.push({key, data:b64, name:f.name});
    addPreview({key, data:b64, name:f.name});
  }
}

function addPreview(img) {
  const grid = document.getElementById('preview');
  const item = document.createElement('div');
  item.className = 'img-preview-item';
  item.dataset.key = img.key;
  item.innerHTML = `<img src="${img.data}" title="${img.name}"><button class="rm-img" onclick="removePreview('${img.key}')">×</button>`;
  grid.appendChild(item);
}

function removePreview(key) {
  pendingImgs = pendingImgs.filter(i => i.key !== key);
  document.querySelector(`.img-preview-item[data-key="${key}"]`)?.remove();
}

function dov(e) { e.preventDefault(); document.getElementById('dropzone').classList.add('drag'); }
function dol() { document.getElementById('dropzone').classList.remove('drag'); }
function ddr(e) { e.preventDefault(); dol(); handleFiles(e.dataTransfer.files); }

async function loadPreviews(keys) {
  const grid = document.getElementById('preview');
  grid.innerHTML = '';
  for (const key of (keys||[])) {
    const img = await dbGet('images', key);
    if (img) addPreview(img);
  }
}

function showLightbox(src) {
  document.getElementById('lbimg').src = src;
  document.getElementById('lb').classList.add('open');
}

// ── Render ────────────────────────────────────────────────────────────────────
function badge(p) {
  const cls = p==='Claude'?'bc':p==='ChatGPT'?'bg':p==='Gemini'?'bge':'bo';
  return `<span class="badge ${cls}"><span class="bdot"></span>${p}</span>`;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const fp = document.getElementById('fp').value;
  const fc = document.getElementById('fc').value;

  let rows = prompts.filter(r => {
    const ms = !q||[r.id,r.prompt,r.results,r.attachments,r.fileUsedFor,r.relatedTo,r.category].some(v=>v&&v.toLowerCase().includes(q));
    const fcat = document.getElementById('fcat').value;
    return ms&&(!fp||r.platform===fp)&&(!fc||r.fileUsedFor===fc)&&(!fcat||r.category===fcat);
  });

  rows.sort((a,b)=>{
    const av=(a[sortCol]||'').toLowerCase(),bv=(b[sortCol]||'').toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });

  document.getElementById('st').textContent = prompts.length;
  document.getElementById('sc').textContent = prompts.filter(r=>r.platform==='Claude').length;
  document.getElementById('sg').textContent = prompts.filter(r=>r.platform==='ChatGPT').length;
  document.getElementById('se').textContent = prompts.filter(r=>r.platform==='Gemini').length;
  document.getElementById('rc').textContent = `${rows.length} of ${prompts.length} entries`;

  const tbody = document.getElementById('tb');
  const empty = document.getElementById('es');
  if (!rows.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  // Load image data for visible rows
  const rowsHtml = await Promise.all(rows.map(async r => {
    const imgs = r.images||[];
    let thumbsHtml = '';
    if (imgs.length) {
      const loaded = await Promise.all(imgs.map(k=>dbGet('images',k)));
      thumbsHtml = '<div class="thumbs">' + loaded.filter(Boolean).map(i =>
        `<img class="thumb" src="${i.data}" title="${i.name}" onclick="showLightbox('${i.data}')">`
      ).join('') + '</div>';
    }
    const pid = r.id.replace(/[^a-zA-Z0-9]/g,'_');
    return `<tr>
      <td class="ci">${esc(r.id)}</td>
      <td class="cr">${esc(r.relatedTo)||'—'}</td>
      <td>${badge(r.platform)}</td>
      <td class="cd">${esc(r.date)||'—'}</td>
      <td class="ct">
        <div class="clamp" id="p${pid}">${esc(r.prompt)}</div>
        <button class="xbtn" onclick="tog('p${pid}',this)">show more</button>
      </td>
      <td>${r.fileUsedFor?`<span class="cp">${esc(r.fileUsedFor)}</span>`:'—'}</td>
      <td>${r.category?`<span class="cp" style="background:#f0fdf4;color:#16a34a;">${esc(r.category)}</span>`:'—'}</td>
      <td class="catt">${esc(r.attachments)||'—'}${thumbsHtml}</td>
      <td class="cres">
        <div class="clamp" id="r${pid}">${esc(r.results)}</div>
        <button class="xbtn" onclick="tog('r${pid}',this)">show more</button>
      </td>
      <td><div class="ra">
        <button class="ib" onclick="editEntry('${r.id}')">✎</button>
        <button class="ib dl" onclick="delEntry('${r.id}')">✕</button>
      </div></td>
    </tr>`;
  }));
  tbody.innerHTML = rowsHtml.join('');
}

function tog(id,btn){
  const el=document.getElementById(id);
  if(el.classList.contains('clamp')){el.classList.remove('clamp');btn.textContent='show less';}
  else{el.classList.add('clamp');btn.textContent='show more';}
}

function srt(col){
  sortDir=sortCol===col?sortDir*-1:1; sortCol=col;
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sa','sd'));
  render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function nextId(){
  const nums=prompts.filter(p=>p.id.match(/^P\d+$/)).map(p=>parseInt(p.id.slice(1))).filter(n=>!isNaN(n));
  return 'P'+String(nums.length?Math.max(...nums)+1:1).padStart(3,'0');
}

function openModal(){
  editingId=null; pendingImgs=[];
  document.getElementById('mt').textContent='Add New Prompt';
  ['fid','frel','fprompt','ffile','fatt','fres'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fid').value=nextId();
  document.getElementById('fplat').value='Claude';
  document.getElementById('fdate').value=new Date().toISOString().slice(0,10);
  populateCatSelect('');
  document.getElementById('fcat_new').style.display='none';
  document.getElementById('preview').innerHTML='';
  document.getElementById('ov').classList.add('open');
}

async function editEntry(id){
  const r=prompts.find(p=>p.id===id); if(!r) return;
  editingId=id; pendingImgs=[];
  document.getElementById('mt').textContent='Edit Entry';
  document.getElementById('fid').value=r.id;
  document.getElementById('frel').value=r.relatedTo;
  document.getElementById('fplat').value=r.platform;
  document.getElementById('fdate').value=r.date;
  document.getElementById('fprompt').value=r.prompt;
  document.getElementById('ffile').value=r.fileUsedFor;
  populateCatSelect(r.category||'');
  document.getElementById('fcat_new').style.display='none';
  document.getElementById('fatt').value=r.attachments;
  document.getElementById('fres').value=r.results;
  // Load existing images into pending
  for (const key of (r.images||[])) {
    const img = await dbGet('images', key);
    if (img) { pendingImgs.push(img); }
  }
  await loadPreviews(r.images||[]);
  document.getElementById('ov').classList.add('open');
}

function closeModal(){ document.getElementById('ov').classList.remove('open'); }
function cmo(e){ if(e.target===document.getElementById('ov')) closeModal(); }

async function saveEntry(){
  const newId = document.getElementById('fid').value.trim();
  if(!newId){alert('ID is required');return;}
  if(!editingId && prompts.find(p=>p.id===newId)){alert('ID already exists');return;}

  // Save images to local IndexedDB
  for (const img of pendingImgs) await dbPut('images', img);
  const imageKeys = pendingImgs.map(i=>i.key);

  const entry = {
    id: newId,
    relatedTo: document.getElementById('frel').value.trim(),
    platform: document.getElementById('fplat').value,
    date: document.getElementById('fdate').value,
    prompt: document.getElementById('fprompt').value.trim(),
    fileUsedFor: document.getElementById('ffile').value.trim(),
    category: document.getElementById('fcat_sel').value==='__new__'?'':document.getElementById('fcat_sel').value,
    attachments: document.getElementById('fatt').value.trim(),
    results: document.getElementById('fres').value.trim(),
    images: imageKeys,
  };

  try {
    await sbUpsert(entry);
    if(editingId){ const i=prompts.findIndex(p=>p.id===editingId); if(i!==-1) prompts[i]=entry; }
    else prompts.push(entry);
    render(); updateCatFilter(); closeModal();
  } catch(e) {
    alert('Save failed: ' + e.message);
  }
}

async function delEntry(id){
  if(!confirm(`Delete ${id}?`)) return;
  const r = prompts.find(p=>p.id===id);
  if(r) for(const k of (r.images||[])) await dbDelete('images',k);
  try {
    await sbDelete(id);
    prompts = prompts.filter(p=>p.id!==id);
    render(); updateCatFilter();
  } catch(e) {
    alert('Delete failed: ' + e.message);
  }
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const cols=['id','relatedTo','platform','date','prompt','fileUsedFor','category','attachments','results'];
  const hdr=['Prompt ID','Related To','AI Platform','Date','Prompt','File Used For','Category','Attachments','Results'];
  const rows=[hdr,...prompts.map(r=>cols.map(c=>`"${(r[c]||'').replace(/"/g,'""')}"` ))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));
  a.download='PARMCO_AI_Prompts.csv'; a.click();
}

// ── Category management ───────────────────────────────────────────────────────
const CATS_KEY = 'parmco_categories';
function getCategories(){
  return JSON.parse(localStorage.getItem(CATS_KEY)||'["Bluetooth","Motor Schematic","SwiftUI","C / Assembly","BLE Advertising","Xcode / iOS Setup","Documentation","Prompt Tracker"]');
}
function saveCategories(cats){ localStorage.setItem(CATS_KEY, JSON.stringify(cats)); }

function populateCatSelect(selected){
  const cats = getCategories();
  const sel = document.getElementById('fcat_sel');
  sel.innerHTML = '<option value="">— No Category —</option>' +
    cats.map(c=>`<option value="${c}"${c===selected?'selected':''}>${c}</option>`).join('') +
    '<option value="__new__">+ Add new category...</option>';
}

function addNewCategory(val){
  val = val.trim();
  if(!val) return;
  const cats = getCategories();
  if(!cats.includes(val)) { cats.push(val); saveCategories(cats); }
  populateCatSelect(val);
  document.getElementById('fcat_sel').value = val;
  document.getElementById('fcat_new').style.display='none';
  document.getElementById('fcat_new').value='';
  updateCatFilter();
}

function updateCatFilter(){
  const cats = getCategories();
  const used = [...new Set(prompts.map(p=>p.category).filter(Boolean))];
  const all = [...new Set([...cats,...used])].sort();
  const sel = document.getElementById('fcat');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Categories</option>' +
    all.map(c=>`<option value="${c}"${c===cur?'selected':''}>${c}</option>`).join('');
}

function copyJSON(){ navigator.clipboard.writeText(JSON.stringify(prompts,null,2)).then(()=>alert('Copied!')); }

// ── Init ──────────────────────────────────────────────────────────────────────
function showStatus(msg, color='#2563eb') {
  let el = document.getElementById('sb-status');
  if(!el){ el=document.createElement('div'); el.id='sb-status'; Object.assign(el.style,{position:'fixed',bottom:'60px',right:'28px',background:color,color:'#fff',padding:'8px 16px',borderRadius:'8px',fontSize:'12px',fontFamily:'IBM Plex Mono,monospace',zIndex:999,boxShadow:'0 2px 8px rgba(0,0,0,.15)',transition:'opacity .5s'}); document.body.appendChild(el); }
  el.style.background = color;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(()=>{ el.style.opacity='0'; }, 3000);
}

async function init(){
  await openDB();

  // Show loading indicator
  document.getElementById('tb').innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:#6b7280;font-family:IBM Plex Mono,monospace;font-size:12px;">Loading from Supabase...</td></tr>';

  try {
    prompts = await sbGetAll();
    if(prompts.length === 0) {
      // First run — seed Supabase with all data in one batch request
      showStatus('First run — seeding database...', '#7c3aed');
      const res = await fetch(`${SB_URL}/rest/v1/prompts`, {
        method: 'POST',
        headers: { ...SB_HDR, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify(SEED.map(toRow)),
      });
      if(!res.ok) throw new Error(await res.text());
      prompts = SEED;
      showStatus('Database seeded ✓', '#16a34a');
    } else {
      showStatus(`Loaded ${prompts.length} entries ✓`, '#16a34a');
    }
  } catch(e) {
    showStatus('Supabase error: ' + e.message, '#dc2626');
    prompts = SEED; // fallback to seed data
  }

  render();
  updateCatFilter();
  document.getElementById('search').addEventListener('input',render);
  document.getElementById('fp').addEventListener('change',render);
  document.getElementById('fc').addEventListener('change',render);
  document.getElementById('fcat').addEventListener('change',render);
}

init();
</script>
